            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1).replace(/([A-Z])/g, '-$1').toLowerCase();
                    const icon = document.createElement('i');
                    icon.setAttribute('data-lucide', iconName);
                    icon.style.width = `${size}px`;
                    icon.style.height = `${size}px`;
                    if (className) icon.className = className;
                    iconRef.current.appendChild(icon);
                    window.lucide.createIcons({
                        attrs: { strokeWidth: 2, width: size, height: size },
                        nameAttr: 'data-lucide',
                        icons: window.lucide.icons
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const callAI = async (prompt, apiKey, onLog, isJson = true) => {
            // 絶対に gemini-2.5-flash を使用するよう固定
            const modelId = "gemini-2.5-flash";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
            
            onLog(`[AI送信]: ${prompt.substring(0, 100)}...`);

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: isJson ? { responseMimeType: "application/json", temperature: 0.7 } : { temperature: 0.7 }
            };

            let retryCount = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];

            while (retryCount <= 5) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.status === 429) {
                        onLog(`[警告]: 429エラー(Rate Limit)。リトライ中... (${retryCount+1}/5)`);
                        await new Promise(r => setTimeout(r, delays[retryCount]));
                        retryCount++;
                        continue;
                    }

                    if (!response.ok) {
                        const errBody = await response.json().catch(() => ({}));
                        throw new Error(`API Error ${response.status}: ${errBody.error?.message || 'Unknown error'}`);
                    }

                    const data = await response.json();
                    const result = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    onLog(`[AI受信]: 完了`);
                    return isJson ? JSON.parse(result) : result;
                } catch (e) {
                    onLog(`[エラー]: ${e.message}`);
                    if (retryCount === 5) throw e;
                    await new Promise(r => setTimeout(r, delays[retryCount]));
                    retryCount++;
                }
            }
        };

        function App() {
            const [appState, setAppState] = useState('setup');
            const [theme, setTheme] = useState('');
            const [learningData, setLearningData] = useState([]);
            const [currentTask, setCurrentTask] = useState(null);
            const [userAnswer, setUserAnswer] = useState('');
            const [evaluation, setEvaluation] = useState(null);
            const [apiKey, setApiKey] = useState('');
            const [logs, setLogs] = useState([]);
            const [showSettings, setShowSettings] = useState(false);
            const [storageName, setStorageName] = useState('srs_learning_data.json');

            const addLog = useCallback((msg) => {
                const ts = new Date().toLocaleTimeString('ja-JP', { hour12: false });
                setLogs(prev => [...prev, `[${ts}] ${msg}`].slice(-200));
            }, []);

            useEffect(() => {
                addLog("システム: アプリケーション初期化中...");
                const savedKey = localStorage.getItem('srs_gemini_key');
                if (savedKey) setApiKey(savedKey);
            }, [addLog]);

            useEffect(() => {
                if (learningData.length > 0) {
                    localStorage.setItem('srs_local_save', JSON.stringify(learningData));
                    addLog("システム: 学習結果を内部ストレージに自動保存しました。");
                }
            }, [learningData, addLog]);

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setStorageName(file.name);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        setLearningData(data);
                        setAppState('theme_input');
                        addLog(`システム: ファイル ${file.name} を読み込みました。`);
                        setShowSettings(false);
                    } catch (err) { alert("無効なファイルです"); addLog("エラー: インポート失敗"); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleExport = () => {
                if (learningData.length === 0) {
                    alert("保存するデータがありません。");
                    return;
                }
                const blob = new Blob([JSON.stringify(learningData, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = storageName;
                a.click();
                URL.revokeObjectURL(url);
                addLog(`システム: 学習データを ${storageName} としてファイル出力しました。`);
            };

            const initFromDefault = () => {
                addLog("システム: 新規学習データを作成します。");
                const initial = INITIAL_GRAMMAR_LIST.map(g => ({
                    id: g.id,
                    text: g.text,
                    meaning: g.meaning,
                    patterns: {
                        'zh-jp': { lastStudied: null, correctCount: 0, incorrectCount: 0, totalCount: 0, level: 1 },
                        'jp-zh': { lastStudied: null, correctCount: 0, incorrectCount: 0, totalCount: 0, level: 1 }
                    }
                }));
                setLearningData(initial);
                setStorageName('srs_learning_data.json');
                setAppState('theme_input');
            };

            const selectNext = () => {
                addLog("システム: SRSアルゴリズムによる対象選択中...");
                const now = Date.now();
                let bestScore = -1;
                let selected = null;

                learningData.forEach(item => {
                    ['zh-jp', 'jp-zh'].forEach(p => {
                        const d = item.patterns[p];
                        let score = 0;
                        if (!d.lastStudied) {
                            score = 1000000 + Math.random();
                        } else {
                            const hours = (now - d.lastStudied) / (1000 * 60 * 60);
                            const interval = Math.pow(d.level, 2) * 12;
                            score = hours / interval;
                        }
                        if (score > bestScore) {
                            bestScore = score;
                            selected = { item, pattern: p };
                        }
                    });
                });
                return selected;
            };

            const startLesson = async () => {
                if (!apiKey) { setShowSettings(true); return; }
                setAppState('loading');
                const task = selectNext();
                addLog(`システム: 「${task.item.text}」(${task.pattern}) を生成中...`);
                
                const prompt = `テーマ「${theme}」と中国語文法「${task.item.text}(意味:${task.item.meaning})」を使用して、以下のJSONを生成してください。
                {"chinese":"中国語例文","pinyin":"ピンイン","japanese":"日本語訳","explanation":"文法の使い方の解説"}`;

                try {
                    const res = await callAI(prompt, apiKey, addLog);
                    setCurrentTask({ ...task, aiData: res });
                    setAppState('question');
                    setUserAnswer('');
                    addLog("システム: 問題生成完了");
                } catch (e) {
                    addLog(`エラー: ${e.message}`);
                    setAppState('theme_input');
                }
            };

            const submitAnswer = async () => {
                setAppState('loading');
                addLog("システム: AIによる添削中...");
                const target = currentTask.pattern === 'zh-jp' ? currentTask.aiData.japanese : currentTask.aiData.chinese;
                const prompt = `問題: ${currentTask.pattern === 'zh-jp' ? currentTask.aiData.chinese : currentTask.aiData.japanese}
                正解の目安: ${target}
                ユーザーの回答: ${userAnswer}
                上記を添削しJSONで返してください。意味が通じていればisCorrectをtrueに。
                {"isCorrect":boolean, "feedback":"具体的なアドバイス", "modelAnswer":"より自然な解答例"}`;

                try {
                    const res = await callAI(prompt, apiKey, addLog);
                    setEvaluation(res);
                    setAppState('result');
                } catch (e) {
                    addLog(`エラー: ${e.message}`);
                    setAppState('question');
                }
            };

            const finishLesson = (lvl) => {
                addLog(`システム: 理解度 ${lvl} を記録`);
                const nextData = learningData.map(item => {
                    if (item.id === currentTask.item.id) {
                        const p = currentTask.pattern;
                        return {
                            ...item,
                            patterns: {
                                ...item.patterns,
                                [p]: {
                                    lastStudied: Date.now(),
                                    totalCount: item.patterns[p].totalCount + 1,
                                    correctCount: item.patterns[p].correctCount + (evaluation.isCorrect ? 1 : 0),
                                    incorrectCount: item.patterns[p].incorrectCount + (evaluation.isCorrect ? 0 : 1),
                                    level: lvl
                                }
                            }
                        };
                    }
                    return item;
                });
                setLearningData(nextData);
                startLesson();
            };

            return (
                <div className="min-h-screen flex flex-col pb-16">
                    <header className="bg-indigo-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
                        <div className="flex items-center gap-2 font-bold"><Icon name="BookOpen" /> <span>中国語 SRS v1.2</span></div>
                        <button onClick={() => setShowSettings(true)} className="p-2 bg-indigo-600 rounded-full hover:bg-indigo-500 transition-colors shadow-sm">
                            <Icon name="Settings" />
                        </button>
                    </header>

                    <main className="p-4 flex-grow max-w-lg mx-auto w-full">
                        {appState === 'setup' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border animate-fade-in mt-10">
                                <h2 className="text-xl font-bold mb-6 text-center text-slate-800">学習データの準備</h2>
                                <p className="text-sm text-slate-600 mb-6 text-center">
                                    過去の学習データファイル(JSON)を読み込むか、新規に学習を開始してください。
                                </p>
                                <div className="space-y-4">
                                    <label className="w-full bg-indigo-50 text-indigo-700 font-bold py-4 rounded-xl border border-indigo-200 flex justify-center items-center cursor-pointer active:scale-95 transition-transform">
                                        <Icon name="Upload" className="mr-2" /> 過去の学習データを読み込む
                                        <input type="file" onChange={handleImport} className="hidden" accept=".json" />
                                    </label>
                                    <button onClick={initFromDefault} className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl flex justify-center items-center active:scale-95 transition-transform shadow-lg shadow-slate-300">
                                        <Icon name="FilePlus" className="mr-2" /> 新規に学習を開始する
                                    </button>
                                </div>
                            </div>
                        )}

                        {appState === 'theme_input' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border animate-fade-in mt-10">
                                <h2 className="font-bold mb-4 text-slate-700">今日の学習テーマ</h2>
                                <input type="text" value={theme} onChange={e => setTheme(e.target.value)} placeholder="例: 職場のトラブル、旅行の予約" className="w-full border p-4 rounded-xl mb-4 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none" />
                                <button onClick={startLesson} disabled={!theme} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl disabled:bg-slate-300 shadow-lg">学習開始</button>
                            </div>
                        )}

                        {appState === 'loading' && (
                            <div className="flex flex-col items-center justify-center py-20 animate-pulse">
                                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-slate-500 font-medium">AIが処理中...</p>
                            </div>
                        )}

                        {appState === 'question' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border animate-fade-in space-y-4">
                                <div className="flex justify-between text-[10px] font-bold text-indigo-500 uppercase">
                                    <span>{currentTask.pattern === 'zh-jp' ? '中国語 → 日本語' : '日本語 → 中国語'}</span>
                                    <span>{currentTask.item.text}</span>
                                </div>
                                <div className="p-4 bg-indigo-50 rounded-xl">
                                    <h3 className="text-2xl font-bold mb-2 leading-tight">
                                        {currentTask.pattern === 'zh-jp' ? currentTask.aiData.chinese : currentTask.aiData.japanese}
                                    </h3>
                                    {currentTask.pattern === 'zh-jp' && <p className="text-indigo-400 font-mono text-sm">{currentTask.aiData.pinyin}</p>}
                                </div>
                                <textarea value={userAnswer} onChange={e => setUserAnswer(e.target.value)} placeholder="回答を入力してください..." className="w-full border p-4 h-32 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" />
                                <button onClick={submitAnswer} disabled={!userAnswer.trim()} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg disabled:bg-slate-300">送信</button>
                            </div>
                        )}

                        {appState === 'result' && (
                            <div className="bg-white p-6 rounded-2xl shadow-sm border animate-fade-in space-y-6">
                                <div className="text-center">
                                    <div className={`text-4xl mb-2 ${evaluation.isCorrect ? 'text-green-500' : 'text-red-500'}`}>
                                        <Icon name={evaluation.isCorrect ? "CheckCircle" : "XCircle"} size={48} />
                                    </div>
                                    <h3 className="text-xl font-bold">{evaluation.isCorrect ? '正解！' : '不正解'}</h3>
                                </div>
                                <div className="space-y-4 text-sm">
                                    <div className="bg-slate-50 p-4 rounded-lg">
                                        <p className="font-bold text-slate-400 mb-1">出題された問題</p>
                                        <p className="text-lg font-bold">{currentTask.pattern === 'zh-jp' ? currentTask.aiData.chinese : currentTask.aiData.japanese}</p>
                                        {currentTask.pattern === 'zh-jp' && <p className="text-indigo-400 font-mono text-sm">{currentTask.aiData.pinyin}</p>}
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-lg"><p className="font-bold text-slate-400 mb-1">模範解答</p><p className="text-lg font-bold">{evaluation.modelAnswer}</p></div>
                                    <div className="bg-amber-50 p-4 rounded-lg"><p className="font-bold text-amber-600 mb-1">フィードバックポイント</p><p>{evaluation.feedback}</p></div>
                                    <div className="bg-indigo-50 p-4 rounded-lg"><p className="font-bold text-indigo-600 mb-1">文法の解説</p><p>{currentTask.aiData.explanation}</p></div>
                                </div>
                                <div className="pt-4 border-t">
                                    <p className="text-center text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">自己評価 (1-5)</p>
                                    <div className="flex gap-2">
                                        {[1,2,3,4,5].map(l => (
                                            <button key={l} onClick={() => finishLesson(l)} className="flex-1 py-4 bg-slate-100 rounded-xl font-bold text-slate-700 active:bg-indigo-600 active:text-white transition-colors">{l}</button>
                                        ))}
                                    </div>
                                    <p className="text-[10px] text-center text-slate-400 mt-2">※選択すると学習結果が自動保存され、次の問題へ進みます</p>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 w-full bg-white border-t p-2 text-[10px] text-slate-400 text-center z-20 font-mono">
                        {appState !== 'setup' ? `File: ${storageName}` : 'No file loaded'} | Model: Gemini-2.5-Flash
                    </footer>

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl relative animate-fade-in">
                                <button onClick={() => setShowSettings(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-700"><Icon name="X" /></button>
                                <h2 className="font-bold text-lg mb-6 flex items-center"><Icon name="Settings" className="mr-2 text-indigo-600" />設定 / データ管理</h2>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-2 uppercase">Gemini API Key</label>
                                        <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="AIza..." />
                                        <button onClick={() => { localStorage.setItem('srs_gemini_key', apiKey); addLog("システム: APIキーを保存しました。"); }} className="mt-2 w-full bg-indigo-100 text-indigo-700 font-bold py-2 rounded-lg text-sm">
                                            APIキーを保存
                                        </button>
                                    </div>

                                    <div className="border-t pt-4">
                                        <p className="text-xs font-bold text-slate-500 mb-3 uppercase">学習データの管理</p>
                                        <button onClick={handleExport} className="w-full bg-slate-800 text-white font-bold py-3 rounded-xl flex justify-center items-center mb-3">
                                            <Icon name="Download" className="mr-2" size={16} /> JSONファイルとして保存
                                        </button>
                                        <label className="w-full bg-indigo-50 text-indigo-700 font-bold py-3 rounded-xl border border-indigo-100 flex justify-center items-center cursor-pointer">
                                            <Icon name="Upload" className="mr-2" size={16} /> JSONファイルを読み込む
                                            <input type="file" onChange={handleImport} className="hidden" accept=".json" />
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <LogWindow logs={logs} onClear={() => setLogs([])} />
                </div>
            );
        }

        const LogWindow = ({ logs, onClear }) => {
            const [min, setMin] = useState(true);
            const [size, setSize] = useState({ w: 320, h: 350 });
            const [pos, setPos] = useState({ x: window.innerWidth - 340, y: window.innerHeight - 50 });
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);
            const dragRef = useRef({ x: 0, y: 0, w: 0, h: 0 });
            const scrollRef = useRef(null);

            useEffect(() => {
                if (!min && scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [logs, min]);

            const onPointerDown = (e, type) => {
                e.preventDefault();
                e.stopPropagation();
                if (type === 'drag') {
                    setIsDragging(true);
                    dragRef.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
                } else if (type === 'resize') {
                    setIsResizing(true);
                    dragRef.current = { x: e.clientX, y: e.clientY, w: size.w, h: size.h, px: pos.x, py: pos.y };
                }
            };

            const onPointerMove = useCallback((e) => {
                if (isDragging) {
                    setPos({ x: e.clientX - dragRef.current.x, y: e.clientY - dragRef.current.y });
                } else if (isResizing) {
                    const dx = dragRef.current.x - e.clientX;
                    const dy = dragRef.current.y - e.clientY;
                    const newW = Math.max(150, dragRef.current.w + dx);
                    const newH = Math.max(80, dragRef.current.h + dy);
                    setSize({ w: newW, h: newH });
                    setPos({ 
                        x: dragRef.current.px - (newW - dragRef.current.w), 
                        y: dragRef.current.py - (newH - dragRef.current.h) 
                    });
                }
            }, [isDragging, isResizing]);

            const onPointerUp = useCallback(() => {
                setIsDragging(false);
                setIsResizing(false);
            }, []);

            useEffect(() => {
                if (isDragging || isResizing) {
                    window.addEventListener('pointermove', onPointerMove);
                    window.addEventListener('pointerup', onPointerUp);
                } else {
                    window.removeEventListener('pointermove', onPointerMove);
                    window.removeEventListener('pointerup', onPointerUp);
                }
                return () => {
                    window.removeEventListener('pointermove', onPointerMove);
                    window.removeEventListener('pointerup', onPointerUp);
                };
            }, [isDragging, isResizing, onPointerMove, onPointerUp]);

            const copyLogs = () => {
                const text = logs.join('\n');
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            };

            return (
                <div 
                    className="fixed z-[9999] bg-slate-900 text-emerald-400 font-mono text-[10px] shadow-2xl overflow-hidden flex flex-col border border-slate-700 rounded-t-lg"
                    style={{ 
                        left: `${pos.x}px`, 
                        top: `${pos.y}px`, 
                        width: `${size.w}px`, 
                        height: min ? '32px' : `${size.h}px`,
                        transition: isDragging || isResizing ? 'none' : 'height 0.2s, width 0.2s'
                    }}
                >
                    {!min && (
                        <div 
                            className="absolute top-0 left-0 w-4 h-4 cursor-nw-resize z-10 hover:bg-emerald-400/20"
                            onPointerDown={(e) => onPointerDown(e, 'resize')}
                        ></div>
                    )}

                    <div 
                        className="bg-slate-800 p-2 flex justify-between items-center no-select drag-handle border-b border-slate-700 cursor-move"
                        onPointerDown={(e) => onPointerDown(e, 'drag')}
                    >
                        <div className="flex items-center gap-1 opacity-80"><Icon name="Terminal" size={12}/> SYSTEM LOG</div>
                        <div className="flex items-center gap-2">
                            {!min && <button onClick={copyLogs} className="hover:text-white px-1"><Icon name="Copy" size={12}/></button>}
                            <button 
                                onClick={(e) => { 
                                    e.stopPropagation(); 
                                    const nextMin = !min;
                                    setMin(nextMin);
                                    if (nextMin) {
                                        setPos({ x: window.innerWidth - size.w - 20, y: window.innerHeight - 50 });
                                    } else {
                                        setPos({ x: window.innerWidth - size.w - 20, y: window.innerHeight - size.h - 40 });
                                    }
                                }} 
                                className="hover:text-white px-1"
                            >
                                <Icon name={min ? "ChevronUp" : "ChevronDown"} size={14}/>
                            </button>
                        </div>
                    </div>

                    {!min && (
                        <div ref={scrollRef} className="flex-1 overflow-y-auto p-2 space-y-1 bg-black/80 log-content select-text overscroll-contain">
                            {logs.length === 0 ? (
                                <div className="text-slate-600 italic">No logs...</div>
                            ) : (
                                logs.map((log, i) => (
                                    <div key={i} className="border-b border-slate-800 pb-1 last:border-0">{log}</div>
                                ))
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
