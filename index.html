<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>HSK6 文法 学習ルーティン</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; }
    h1 { font-size: 24px; }
    .day { margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>HSK6 文法 学習ルーティン（毎日5個）</h1>

<script>
// ===== 文法データ（250個） =====
const grammarList = [
"了（完了）","了（変化）","过（経験）","着（持続）","把構文","被構文","是…的構文","连…都…","越…越…","一边…一边…",
"虽然…但是…","如果…就…","因为…所以…","不但…而且…","只有…才…","即使…也…","与其…不如…","不仅…还…","要是…就…","既然…就…",
"越…越不…","再…也…","无论…都…","一…就…","刚…就…","快要…了","差点儿…","几乎…","从来不…","一直…",
"正在…","已经…了","还没…","先…再…","除了…以外…","对…来说","关于…","至于…","由于…","为了…",
"通过…","根据…","按照…","随着…","围绕…","围绕着…","围绕…展开","以…为主","以便…","以免…",
"不如…","比…更…","没有…那么…","越…越好","最…","越来越…","更…了","不太…","有点儿…","挺…的",
"太…了","真…","非常…","十分…","极其…","格外…","特别…","相当…","比较…","稍微…",
"一点儿也不…","根本不…","并不…","未必…","难免…","难得…","不得不…","不能不…","不得了","了不起",
"好像…","似乎…","看来…","据说…","听说…","据…说","据…了解","可以说…","可以看出…","显然…",
"当然…","其实…","事实上…","总体来说…","一般来说…","换句话说…","也就是说…","比如…","例如…","换言之…",
"一方面…另一方面…","不仅如此…","除此之外…","与此同时…","相反…","反而…","然而…","不过…","可是…","而且…",
"于是…","因此…","从而…","结果…","导致…","造成…","引起…","影响…","决定…","取决于…",
"有助于…","有利于…","不利于…","便于…","利于…","适合…","符合…","满足…","实现…","达到…",
"提高…","增强…","改善…","优化…","促进…","推动…","加强…","扩大…","减少…","降低…",
"避免…","防止…","控制…","解决…","处理…","应对…","面对…","针对…","围绕…","聚焦…",
"涉及…","包括…","包含…","由…组成","构成…","属于…","归…所有","来源于…","产生于…","基于…",
"建立在…基础上","以…为基础","以…为前提","在…情况下","在…过程中","在…方面","在…范围内","在…之内","在…之外","在…之上",
"对…有影响","对…有帮助","对…有利","对…不利","对…感兴趣","对…负责","对…满意","对…失望","对…依赖","对…重视",
"使…","让…","叫…","被…","给…","把…","将…","向…","往…","从…",
"到…","离…","跟…","和…","与…","对于…","关于…","至于…","除了…","除了…以外…",
"连…也…","连…都不…","甚至…","甚至于…","何况…","更不用说…","别说…","更别说…","难道…吗","不是…吗",
"怎么…呢","为什么…","凭什么…","如何…","怎样…","多少…","几…","哪儿…","什么时候…","谁…",
"什么…","哪一个…","哪种…","哪儿来的…","谁的…","多少个…","多少次…","多久…","多长时间…","多远…",
"一会儿…一会儿…","一边…一边…","一方面…一方面…","一旦…就…","一连…","一向…","一再…","一共…","一律…","一概…",
"逐渐…","慢慢…","渐渐…","不断…","持续…","连续…","反复…","频繁…","偶尔…","有时…",
"常常…","经常…","往往…","总是…","始终…","终于…","最后…","首先…","其次…","然后…"
];

// ===== 日付生成 =====
const startDate = new Date(2026, 0, 1);
const endDate = new Date(2026, 8, 30);
let index = 0;
let html = "";

for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
  const m = d.getMonth() + 1;
  const day = d.getDate();

  for (let i = 0; i < 5; i++) {
    html += `<div class=\"day\">${m}/${day}, ${grammarList[index]}</div>`;
    index++;
    if (index >= grammarList.length) index = 0;
  }
}

document.write(html);
</script>

</body>
</html>
