        // --- Helper: ファイル保存 ---
        const saveFile = async (content, defaultName) => {
            try {
                if (window.showSaveFilePicker) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: defaultName,
                        types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    return handle.name;
                } else {
                    const blob = new Blob([content], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = defaultName; a.click();
                    URL.revokeObjectURL(url);
                    return defaultName;
                }
            } catch (e) { return null; }
        };

        // --- UI components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1).replace(/([A-Z])/g, '-$1').toLowerCase();
                    const icon = document.createElement('i');
                    icon.setAttribute('data-lucide', iconName);
                    icon.style.width = `${size}px`; icon.style.height = `${size}px`;
                    if (className) icon.className = className;
                    iconRef.current.appendChild(icon);
                    window.lucide.createIcons({
                        attrs: { strokeWidth: 2, width: size, height: size },
                        nameAttr: 'data-lucide', icons: window.lucide.icons
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        // --- Main App ---
        function App() {
            const [appState, setAppState] = useState('setup');
            const [theme, setTheme] = useState('');
            const [learningData, setLearningData] = useState([]); // 250文法全体
            const [feedbackHistory, setFeedbackHistory] = useState([]); // 追記型フィードバック
            const [currentTask, setCurrentTask] = useState(null);
            const [userAnswer, setUserAnswer] = useState('');
            const [evaluation, setEvaluation] = useState(null);
            const [apiKey, setApiKey] = useState('');
            const [logs, setLogs] = useState([]);
            const [showSettings, setShowSettings] = useState(false);
            const [storageName, setStorageName] = useState('srs_learning_data.json');
            const [errorMessage, setErrorMessage] = useState('');

            const addLog = useCallback((msg) => {
                const ts = new Date().toLocaleTimeString('ja-JP', { hour12: false });
                setLogs(prev => [...prev, `[${ts}] ${msg}`].slice(-300));
            }, []);

            useEffect(() => {
                addLog("システム: アプリケーション起動 v1.8");
                const savedKey = localStorage.getItem('srs_gemini_key');
                if (savedKey) setApiKey(savedKey);
            }, [addLog]);

            const callAIWithFallback = async (prompt, key, isJson = true) => {
                const models = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-flash-latest", "gemini-3-flash-preview"];
                for (let i = 0; i < models.length; i++) {
                    const modelId = models[i];
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${key}`;
                    addLog(`[AI試行]: モデル ${modelId} を使用中...`);
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: isJson ? { responseMimeType: "application/json", temperature: 0.7 } : { temperature: 0.7 }
                    };
                    try {
                        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        if (response.status === 429) {
                            addLog(`[警告]: ${modelId} レートリミット。次へ移行。`);
                            if (i === models.length - 1) throw new Error("全モデル制限中。");
                            continue;
                        }
                        if (!response.ok) throw new Error(`API Error ${response.status}`);
                        const data = await response.json();
                        const result = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        return isJson ? JSON.parse(result) : result;
                    } catch (e) {
                        if (i === models.length - 1) { addLog(`[致命的]: ${e.message}`); throw e; }
                    }
                }
            };

            const handleImport = (e) => {
                const file = e.target.files[0]; if (!file) return;
                setStorageName(file.name);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try { const data = JSON.parse(ev.target.result); setLearningData(data); setAppState('theme_input'); addLog(`システム: 学習データ読込完了。`); }
                    catch (err) { addLog("エラー: ファイル解析失敗"); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const handleImportFeedback = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (Array.isArray(data)) { setFeedbackHistory(data); addLog(`システム: フィードバック読込 (${data.length}件)。追記可能です。`); }
                    } catch (err) { addLog("エラー: 解析失敗"); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const initFromDefault = () => {
                const initial = INITIAL_GRAMMAR_LIST.map(g => ({
                    id: g.id, text: g.text, meaning: g.meaning,
                    patterns: {
                        'zh-jp': { lastStudied: null, correctCount: 0, incorrectCount: 0, totalCount: 0, level: 1 },
                        'jp-zh': { lastStudied: null, correctCount: 0, incorrectCount: 0, totalCount: 0, level: 1 }
                    }
                }));
                setLearningData(initial);
                setStorageName('srs_learning_data.json');
                localStorage.setItem('srs_local_save', JSON.stringify(initial));
                addLog("システム: 250個の学習データを初期化しました。");
                setAppState('theme_input');
            };

            const selectNextTask = () => {
                const now = Date.now();
                let bestScore = -1; let selected = null;
                learningData.forEach(item => {
                    ['zh-jp', 'jp-zh'].forEach(p => {
                        const d = item.patterns[p];
                        let score = !d.lastStudied ? (1000000 + Math.random()) : ((now - d.lastStudied) / (1000 * 60 * 60)) / (Math.pow(d.level, 2) * 12);
                        if (score > bestScore) { bestScore = score; selected = { item, pattern: p }; }
                    });
                });
                return selected;
            };

            const startLesson = async () => {
                if (!apiKey) { setShowSettings(true); return; }
                const task = selectNextTask();
                setAppState('loading');
                const prompt = `テーマ「${theme}」と中国語文法「${task.item.text}(意味:${task.item.meaning})」を使用してJSON生成: {"chinese":"..","pinyin":"..","japanese":"..","explanation":".."}`;
                try {
                    const res = await callAIWithFallback(prompt, apiKey);
                    setCurrentTask({ ...task, aiData: res });
                    setAppState('question'); setUserAnswer(''); setErrorMessage('');
                } catch (e) { setErrorMessage(e.message); setAppState('theme_input'); }
            };

            const submitAnswer = async () => {
                setAppState('loading');
                const target = currentTask.pattern === 'zh-jp' ? currentTask.aiData.japanese : currentTask.aiData.chinese;
                const prompt = `問題: ${currentTask.pattern === 'zh-jp' ? currentTask.aiData.chinese : currentTask.aiData.japanese} \n正解目安: ${target} \n回答: ${userAnswer} \n添削JSON: {"isCorrect":boolean, "feedback":"..", "modelAnswer":".."}`;
                try {
                    const res = await callAIWithFallback(prompt, apiKey);
                    setEvaluation(res); setAppState('result');
                } catch (e) { setErrorMessage(e.message); setAppState('question'); }
            };

            const finishLesson = (lvl) => {
                addLog(`システム: 理解度 ${lvl} で更新。`);
                
                const newFeedback = {
                    date: new Date().toLocaleString(),
                    topic: theme,
                    grammar: currentTask.item.text,
                    example: currentTask.pattern === 'zh-jp' ? currentTask.aiData.chinese : currentTask.aiData.japanese,
                    isCorrect: evaluation.isCorrect,
                    modelAnswer: evaluation.modelAnswer,
                    feedback: evaluation.feedback,
                    explanation: currentTask.aiData.explanation
                };
                setFeedbackHistory(prev => [...prev, newFeedback]);

                const nextData = learningData.map(item => {
                    if (item.id === currentTask.item.id) {
                        const p = currentTask.pattern;
                        return { ...item, patterns: { ...item.patterns, [p]: {
                            lastStudied: Date.now(),
                            totalCount: item.patterns[p].totalCount + 1,
                            correctCount: item.patterns[p].correctCount + (evaluation.isCorrect ? 1 : 0),
                            incorrectCount: item.patterns[p].incorrectCount + (evaluation.isCorrect ? 0 : 1),
                            level: lvl
                        }}};
                    }
                    return item;
                });
                setLearningData(nextData);
                localStorage.setItem('srs_local_save', JSON.stringify(nextData));
                setAppState('result_action');
            };

            return (
                <div className="min-h-screen flex flex-col pb-16 bg-slate-50">
                    <header className="bg-indigo-800 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-2 font-bold"><Icon name="BookOpen" /> <span>中国語 SRS v1.8</span></div>
                        <button onClick={() => setShowSettings(true)} className="p-2 bg-indigo-700 rounded-full active:scale-90 transition-all"><Icon name="Settings" /></button>
                    </header>

                    <main className="p-4 flex-grow max-w-lg mx-auto w-full">
                        {errorMessage && <div className="mb-4 p-4 bg-red-50 text-red-700 rounded-xl text-xs flex gap-2"><Icon name="AlertTriangle" size={14}/> {errorMessage}</div>}

                        {appState === 'setup' && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border mt-6 animate-fade-in text-center">
                                <h2 className="text-lg font-bold mb-6">学習データを読み込みますか？</h2>
                                <div className="space-y-4">
                                    <label className="w-full bg-indigo-50 text-indigo-700 font-bold py-5 rounded-2xl flex justify-center items-center cursor-pointer">
                                        <Icon name="Upload" className="mr-3" /> インポート
                                        <input type="file" onChange={handleImport} className="hidden" accept=".json" />
                                    </label>
                                    <button onClick={initFromDefault} className="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl flex justify-center items-center">
                                        <Icon name="FilePlus" className="mr-3" /> 新規データ作成
                                    </button>
                                </div>
                            </div>
                        )}

                        {appState === 'theme_input' && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border mt-6 animate-fade-in">
                                <h2 className="font-bold mb-4 flex items-center gap-2 text-indigo-600"><Icon name="Target" size={18}/> 今日のテーマ</h2>
                                <input type="text" value={theme} onChange={e => setTheme(e.target.value)} placeholder="例: 職場の技術的トラブル" className="w-full border-2 p-4 rounded-2xl mb-4 bg-slate-50 outline-none" />
                                <button onClick={startLesson} disabled={!theme} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform disabled:bg-slate-300">学習開始</button>
                            </div>
                        )}

                        {appState === 'loading' && <div className="py-24 flex flex-col items-center animate-pulse"><div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div><p className="text-slate-400 font-bold">AI処理中...</p></div>}

                        {appState === 'question' && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border animate-fade-in space-y-5">
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{currentTask.pattern.toUpperCase()} | {currentTask.item.text}</div>
                                <div className="p-6 bg-slate-900 text-white rounded-3xl shadow-inner">
                                    <h3 className="text-xl font-bold mb-2">{currentTask.pattern === 'zh-jp' ? currentTask.aiData.chinese : currentTask.aiData.japanese}</h3>
                                    {currentTask.pattern === 'zh-jp' && <p className="text-indigo-300 font-mono text-sm">{currentTask.aiData.pinyin}</p>}
                                </div>
                                <textarea value={userAnswer} onChange={e => setUserAnswer(e.target.value)} placeholder="回答を入力..." className="w-full border-2 p-4 h-32 rounded-2xl outline-none" />
                                <button onClick={submitAnswer} className="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-transform">送信</button>
                            </div>
                        )}

                        {(appState === 'result' || appState === 'result_action') && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border animate-fade-in space-y-4">
                                <div className="text-center pb-4">
                                    <Icon name={evaluation.isCorrect ? "CheckCircle" : "XCircle"} size={48} className={evaluation.isCorrect ? "text-green-500" : "text-red-500"} />
                                    <h3 className="text-xl font-bold mt-2">{evaluation.isCorrect ? '正解！' : '不正解'}</h3>
                                </div>
                                <div className="space-y-3 text-sm">
                                    <div className="p-3 bg-emerald-50 rounded-xl"><strong>模範:</strong> {evaluation.modelAnswer}</div>
                                    <div className="p-3 bg-amber-50 rounded-xl"><strong>助言:</strong> {evaluation.feedback}</div>
                                    <div className="p-3 bg-indigo-50 rounded-xl"><strong>解説:</strong> {currentTask.aiData.explanation}</div>
                                </div>
                                {appState === 'result' ? (
                                    <div className="flex gap-2 pt-4 border-t">
                                        {[1,2,3,4,5].map(l => <button key={l} onClick={() => finishLesson(l)} className="flex-1 py-4 bg-slate-50 font-bold rounded-xl active:bg-indigo-600 active:text-white transition-all">{l}</button>)}
                                    </div>
                                ) : (
                                    <div className="flex gap-2 pt-4 border-t">
                                        <button onClick={startLesson} className="flex-1 py-4 bg-indigo-600 text-white rounded-xl font-bold">次へ進む</button>
                                        <button onClick={() => setAppState('save_prompt')} className="flex-1 py-4 bg-slate-800 text-white rounded-xl font-bold">終了</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {appState === 'save_prompt' && (
                            <div className="bg-white p-6 rounded-3xl shadow-sm border mt-6 animate-fade-in text-center space-y-4">
                                <h2 className="font-bold text-lg">学習を終了して保存しますか？</h2>
                                <button onClick={() => saveFile(JSON.stringify(learningData, null, 2), storageName)} className="w-full py-4 bg-indigo-50 text-indigo-700 font-bold rounded-2xl border border-indigo-100 flex justify-center items-center"><Icon name="Save" className="mr-2" size={16}/> 学習結果データを保存</button>
                                <button onClick={() => saveFile(JSON.stringify(feedbackHistory, null, 2), 'feedback_history.json')} className="w-full py-4 bg-emerald-50 text-emerald-700 font-bold rounded-2xl border border-emerald-100 flex justify-center items-center"><Icon name="Download" className="mr-2" size={16}/> フィードバック履歴を保存</button>
                                <button onClick={() => setAppState('theme_input')} className="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl flex justify-center items-center"><Icon name="Home" className="mr-2" size={16}/> 保存せずにテーマ入力へ戻る</button>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 w-full bg-white/90 backdrop-blur border-t p-2 text-[10px] text-slate-400 flex justify-center gap-4 z-30 font-mono">
                        <span className="flex items-center gap-1"><Icon name="FileJson" size={10}/> {storageName}</span>
                        <span className="flex items-center gap-1"><Icon name="Cpu" size={10}/> Gemini-2.5-Flash</span>
                    </footer>

                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/70 z-[100] flex items-center justify-center p-4 backdrop-blur">
                            <div className="bg-white p-6 rounded-[2rem] w-full max-w-md shadow-2xl relative">
                                <button onClick={() => setShowSettings(false)} className="absolute top-6 right-6 text-slate-400 p-2"><Icon name="X" size={20}/></button>
                                <h2 className="font-black text-xl mb-6 flex items-center"><Icon name="Settings" className="mr-2 text-indigo-600" /> 設定管理</h2>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">API KEY</label>
                                        <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full border-2 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm mb-2" />
                                        <button onClick={() => { localStorage.setItem('srs_gemini_key', apiKey); setShowSettings(false); addLog("システム: キーを保存しました。"); }} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl text-xs">APIキー保存</button>
                                    </div>
                                    <div className="space-y-2 border-t pt-4">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">データの保存・読み込み</p>
                                        
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={() => saveFile(JSON.stringify(learningData, null, 2), storageName)} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl text-[11px] flex items-center justify-center gap-1">
                                                <Icon name="Save" size={12}/> 学習データ保存
                                            </button>
                                            <button onClick={() => saveFile(JSON.stringify(feedbackHistory, null, 2), 'feedback_history.json')} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl text-[11px] flex items-center justify-center gap-1">
                                                <Icon name="Download" size={12}/> 履歴保存
                                            </button>
                                        </div>

                                        <label className="w-full py-3 bg-indigo-50 text-indigo-700 font-bold rounded-xl border-2 border-dashed border-indigo-200 flex justify-center items-center cursor-pointer text-[11px] mt-2">
                                            履歴ファイル読込（追記用）
                                            <input type="file" onChange={handleImportFeedback} className="hidden" accept=".json" />
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    <LogWindow logs={logs} onClear={() => setLogs([])} />
                </div>
            );
        }

        const LogWindow = ({ logs, onClear }) => {
            const [min, setMin] = useState(true);
            const [size, setSize] = useState({ w: 320, h: 250 });
            const [pos, setPos] = useState({ x: 20, y: window.innerHeight - 50 });
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);
            const dragRef = useRef({ x: 0, y: 0, w: 0, h: 0 });
            const scrollRef = useRef(null);

            useEffect(() => { if (!min && scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [logs, min]);

            const onPointerMove = useCallback((e) => {
                if (isDragging) {
                    setPos({ x: e.clientX - dragRef.current.x, y: e.clientY - dragRef.current.y });
                } else if (isResizing) {
                    setSize({ 
                        w: Math.max(200, dragRef.current.w + (e.clientX - dragRef.current.x)), 
                        h: Math.max(100, dragRef.current.h + (e.clientY - dragRef.current.y)) 
                    });
                }
            }, [isDragging, isResizing]);

            useEffect(() => {
                if (isDragging || isResizing) {
                    window.addEventListener('pointermove', onPointerMove);
                    const stop = () => { setIsDragging(false); setIsResizing(false); };
                    window.addEventListener('pointerup', stop);
                    return () => { window.removeEventListener('pointermove', onPointerMove); window.removeEventListener('pointerup', stop); };
                }
            }, [isDragging, isResizing, onPointerMove]);

            return (
                <div 
                    className="log-window fixed z-[9999] bg-slate-900 text-emerald-400 font-mono text-[9px] shadow-2xl flex flex-col border border-slate-700 rounded-xl overflow-hidden shadow-black/50"
                    style={{ left: `${pos.x}px`, top: `${pos.y}px`, width: `${size.w}px`, height: min ? '36px' : `${size.h}px` }}
                >
                    <div 
                        className="bg-slate-800 p-2 flex justify-between items-center cursor-move select-none" 
                        onPointerDown={(e) => { 
                            e.preventDefault(); 
                            setIsDragging(true); 
                            dragRef.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; 
                        }}
                    >
                        <span className="opacity-70 flex items-center gap-1"><Icon name="Terminal" size={12}/> LOG</span>
                        <div className="flex gap-2">
                            {!min && (
                                <button onClick={() => { 
                                    const text = logs.join('\n'); 
                                    const el = document.createElement('textarea'); 
                                    el.value = text; 
                                    document.body.appendChild(el); 
                                    el.select(); 
                                    document.execCommand('copy'); 
                                    document.body.removeChild(el); 
                                }}>
                                    <Icon name="Copy" size={12}/>
                                </button>
                            )}
                            <button onClick={(e) => { e.stopPropagation(); setMin(!min); }}><Icon name={min ? "ChevronUp" : "ChevronDown"} size={14}/></button>
                        </div>
                    </div>
                    {!min && (
                        <>
                            <div 
                                ref={scrollRef} 
                                className="log-content flex-1 overflow-y-auto p-2 space-y-1 bg-black/50 select-text"
                                onTouchStart={e => e.stopPropagation()} /* バックグラウンドへのスクロール伝播防止 */
                            >
                                {logs.map((l, i) => <div key={i}>{l}</div>)}
                            </div>
                            <div 
                                className="absolute bottom-0 right-0 w-5 h-5 cursor-se-resize bg-slate-700/50 rounded-tl-lg flex items-center justify-center" 
                                onPointerDown={(e) => { 
                                    e.preventDefault(); 
                                    setIsResizing(true); 
                                    dragRef.current = { x: e.clientX, y: e.clientY, w: size.w, h: size.h }; 
                                }}
                            >
                                <div className="w-1.5 h-1.5 border-r-2 border-b-2 border-slate-400"></div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
